<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Manager</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<header class="topbar">
  <div class="brand">Inventory Manager</div>
  <div class="actions">
    <button id="mode-btn" class="mode-btn">Mobile</button>
    <button id="theme-btn" class="theme-btn">Dark</button>
  </div>
  <div class="spacer"></div>
</header>
<main class="content">
  <section class="panel section">
    <h3>Import CSV</h3>
    <div class="row">
      <input id="table" placeholder="table name (e.g. inventory)">
      <input id="file" type="file" accept=".csv">
      <button id="import">Import</button>
    </div>
    <div id="import-status" class="status"></div>
  </section>
  <section class="panel section">
    <h3>Browse</h3>
    <div class="row">
      <input id="browse-table" placeholder="table to browse">
      <button id="load">Load</button>
    </div>
    <div id="schema"></div>
    <div id="data"></div>
  </section>
</main>
<script type="module" src="./app.js"></script>
</body>
</html>
