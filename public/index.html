<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Manager</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<header class="topbar">
  <div class="brand"><img id="brand-logo" class="brand-logo" alt=""> <span class="brand-name">Inventory Manager</span></div>
  <nav class="main-nav">
    <a class="nav-btn active" data-section="dashboard" href="#section-dashboard">Dashboard</a>
    <a class="nav-btn" data-section="vendor" href="#section-vendor">Vendor</a>
    <a class="nav-btn" data-section="purchase-order" href="#section-purchase-order">Purchase Order</a>
    <a class="nav-btn" data-section="inventory" href="#section-inventory">Inventory</a>
    <a class="nav-btn" data-section="sales-order" href="#section-sales-order">Sales Order</a>
    <a class="nav-btn" data-section="customer" href="#section-customer">Customer</a>
    <a class="nav-btn" data-section="settings" href="#section-settings">Settings</a>
  </nav>
  <div class="actions">
    <button id="mode-btn" class="mode-btn">Mobile</button>
    <button id="theme-btn" class="theme-btn">Dark</button>
  </div>
</header>
<main class="content">
  <section id="section-dashboard" class="panel section section-active">
    <h2>Dashboard</h2>
    <div class="dashboard-grid">
      <div class="card">
        <div class="card-label">Inventory</div>
        <div class="card-value" id="dash-inventory">-</div>
      </div>
      <div class="card">
        <div class="card-label">Vendors</div>
        <div class="card-value" id="dash-vendor">-</div>
      </div>
      <div class="card">
        <div class="card-label">Customers</div>
        <div class="card-value" id="dash-customer">-</div>
      </div>
      <div class="card">
        <div class="card-label">Open Orders</div>
        <div class="card-value" id="dash-orders">-</div>
      </div>
    </div>
  </section>
  <section id="section-vendor" class="panel section">
    <h2>Vendor</h2>
    <div id="tbl-vendor" class="table-host"></div>
  </section>
  <section id="section-purchase-order" class="panel section">
    <h2>Purchase Order</h2>
    <div id="tbl-po" class="table-host"></div>
  </section>
  <section id="section-inventory" class="panel section">
    <h2>Inventory</h2>
    <div class="row">
      <input id="table" placeholder="table name (e.g. inventory)">
      <input id="file" type="file" accept=".csv">
      <button id="import">Import</button>
    </div>
    <div id="import-status" class="status"></div>
    <hr>
    <div class="row">
      <input id="browse-table" placeholder="table to browse">
      <button id="load">Load</button>
    </div>
    <div id="schema"></div>
    <div id="data"></div>
  </section>
  <section id="section-sales-order" class="panel section">
    <h2>Sales Order</h2>
    <div id="tbl-so" class="table-host"></div>
  </section>
  <section id="section-customer" class="panel section">
    <h2>Customer</h2>
    <div id="tbl-customer" class="table-host"></div>
  </section>
  <section id="section-settings" class="panel section">
    <h2>Settings</h2>
    <div class="row">
      <button id="logo-select"><img id="logo-select-icon" class="logo-select-icon" alt=""><span id="logo-select-text">Select Logo</span></button>
      <button id="logo-clear">Clear Logo</button>
    </div>
    <hr>
    <div class="row">
      <button id="db-backup">Backup Database</button>
      <button id="db-restore">Restore Database</button>
    </div>
    <div id="db-restore-status" class="status"></div>
  </section>
</main>
<script type="module" src="./app.js"></script>
</body>
</html>
